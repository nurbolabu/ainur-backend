<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI NUR Widget - Pure UI Kit</title>
    <style>
        /* =========================================
           UI KIT & DESIGN SYSTEM (Apple iOS Style)
           ========================================= */
        :root {
            --ainur-primary: #8BFDA8; 
            --ainur-secondary: #00B0F2;
            --ainur-bg-black: #000000; 
            --ainur-bg-chat: #FFFFFF; 
            --ainur-bg-ai-msg: #E9E9EB;
            --ainur-bg-menu-blur: rgba(0, 0, 0, 0.85); 
            --ainur-icon-gray: #3A3A3C;
            --ainur-radius-window: 30px; 
            --ainur-radius-msg: 20px; 
            --ainur-radius-bar: 26px;
            --ainur-spacing-base: 20px; 
            --ainur-spacing-gap: 10px;
        }

        /* Только для теста отображения (можно удалить при интеграции) */
        body { margin: 0; padding: 0; background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; }

        /* БАЗА ВИДЖЕТА */
        #ainur-widget {
            position: fixed; bottom: var(--ainur-spacing-base); left: 50%; transform: translateX(-50%);
            z-index: 99999; display: flex; flex-direction: column; align-items: center; 
            opacity: 0; transition: opacity 0.4s ease;
        }

        #ainur-popup-area { margin-bottom: var(--ainur-spacing-gap); position: relative; width: 340px; z-index: 10; }
        
        /* Дышащее свечение ИИ (Не перекрывает клики: pointer-events: none) */
        #ainur-ai-glow {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 100px;
            background: linear-gradient(to top, rgba(139, 253, 168, 0.9) 0%, rgba(0, 176, 242, 0.6) 30%, rgba(255, 255, 255, 0) 100%);
            filter: blur(20px); opacity: 0; transition: opacity 0.8s ease; pointer-events: none; z-index: 15;
            animation: ainurAiGlowPulse 4s infinite ease-in-out;
        }
        @keyframes ainurAiGlowPulse { 0%, 100% { transform: translateX(-50%) scale(1) translateY(0); opacity: 0.7;} 50% { transform: translateX(-50%) scale(1.05) translateY(-5px); opacity: 1;} }

        /* Базовая панель ввода */
        #ainur-bottom-bar { 
            display: flex; align-items: center; width: 340px; height: 52px;
            background: #ffffff; border-radius: var(--ainur-radius-bar); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); 
            padding: 4px; box-sizing: border-box; transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1), background 0.5s;
            overflow: hidden; justify-content: center; position: relative; z-index: 20; 
        }
        #ainur-bottom-bar.intro-state { width: 44px; height: 44px; padding: 0; background: transparent; box-shadow: none; }

        /* Кнопки навигации 32x32 */
        .ainur-nav-btn {
            width: 32px; height: 32px; border-radius: 16px; background: #E5E5EA;
            display: flex; justify-content: center; align-items: center;
            border: none; cursor: pointer; transition: background 0.2s; flex-shrink: 0; padding: 0;
        }
        .ainur-nav-btn:active { background: #D1D1D6; }
        .ainur-nav-icon { width: 14px; height: 14px; stroke: var(--ainur-icon-gray); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        /* УНИВЕРСАЛЬНЫЙ КРЕСТИК ЗАКРЫТИЯ */
        #ainur-universal-close { position: absolute; top: 16px; right: 15px; z-index: 100; display: none; }

        /* --- СТЕКЛЯННАЯ ШАПКА --- */
        .ainur-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-bottom: 0.5px solid rgba(0,0,0,0.1); z-index: 50; height: 60px; box-sizing: border-box;
        }

        /* --- MENU VIEW --- */
        #ainur-menu-window {
            display: none; width: 340px; height: fit-content; max-height: calc(100vh - 120px); overflow-y: auto;
            background: var(--ainur-bg-menu-blur); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: var(--ainur-radius-window); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            padding: 10px 0; box-sizing: border-box; flex-direction: column;
            transform-origin: bottom center; animation: ainurPopUpMenu 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        .ainur-menu-item { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 15px 25px; transition: background 0.2s; position: relative; }
        .ainur-menu-item:active { background: rgba(255, 255, 255, 0.1); }
        .ainur-menu-item:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 64px; right: 0; height: 0.5px; background: rgba(255, 255, 255, 0.15); }
        .ainur-menu-text { color: #FFFFFF; font-size: 16px; font-weight: 500; }

        /* --- CHAT VIEW --- */
        #ainur-chat-window {
            display: none; width: 340px; height: 420px;
            background: var(--ainur-bg-chat); border-radius: var(--ainur-radius-window); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            flex-direction: column; overflow: hidden; transform-origin: bottom center;
            animation: ainurPopUpMenu 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; position: relative;
        }
        @keyframes ainurPopUpMenu { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        #ainur-chat-window .ainur-header { position: absolute; top: 0; left: 0; width: 100%; }
        
        .ainur-chat-header-content { display: flex; align-items: center; flex-grow: 1; overflow: hidden; }
        .ainur-story-ring-small { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(45deg, var(--ainur-primary), var(--ainur-secondary)); padding: 3px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; margin-right: 12px; cursor: pointer; transition: transform 0.2s; flex-shrink: 0;}
        .ainur-story-ring-small:active { transform: scale(0.95); }
        .ainur-avatar-small { width: 100%; height: 100%; border-radius: 50%; background: #ddd; border: 2px solid #fff; box-sizing: border-box;}

        .ainur-brand-info { flex-grow: 1; cursor: pointer; overflow: hidden; }
        .ainur-brand-name { font-weight: 600; font-size: 16px; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .ainur-brand-profile { font-size: 12px; color: #888; }

        .ainur-chat-body { flex-grow: 1; padding: 75px 15px 20px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #ffffff; }
        .ainur-message-wrapper { width: 100%; display: flex; flex-direction: column; }
        .ainur-message-wrapper.ai { align-items: flex-start; }
        .ainur-message-wrapper.client { align-items: flex-end; }
        .ainur-message { width: fit-content; max-width: 290px; padding: 12px 16px; border-radius: var(--ainur-radius-msg); font-size: 15px; line-height: 1.4; color: #000000; box-sizing: border-box; }
        .ainur-message.ai { background: var(--ainur-bg-ai-msg); border-bottom-left-radius: 4px; }
        .ainur-message.client { background: var(--ainur-primary); border-bottom-right-radius: 4px; }

        .ainur-quick-replies { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; width: 100%; max-width: 300px; }
        .ainur-qr-btn { background: transparent; color: var(--ainur-icon-gray); border: 1px solid var(--ainur-icon-gray); height: 32px; padding: 0 14px; border-radius: 16px; font-size: 14px; font-weight: 400; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .ainur-qr-btn:active { transform: scale(0.95); background: rgba(58, 58, 60, 0.08); }

        /* --- PROFILE SHEET --- */
        #ainur-profile-window { position: absolute; top: 100%; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 20; transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); display: block; overflow-y: auto; border-radius: var(--ainur-radius-window); }
        #ainur-profile-window.active { top: 0; }
        #ainur-profile-window .ainur-header { position: sticky; top: 0; margin-bottom: -1px; }

        .ainur-profile-content { padding: 20px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .ainur-story-ring-large { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(45deg, var(--ainur-primary), var(--ainur-secondary)); padding: 5px; display: flex; justify-content: center; align-items: center; box-sizing: border-box; cursor: pointer; }
        .ainur-avatar-large { width: 100%; height: 100%; border-radius: 50%; background: #ddd; border: 4px solid #fff; box-sizing: border-box; }
        .ainur-profile-title { font-size: 20px; font-weight: 600; color: #000; margin-top: 15px; text-align: center; }
        .ainur-profile-socials { display: flex; gap: 15px; margin-top: 15px; }
        .ainur-social-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.2s; color: white;}
        .ainur-bg-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
        .ainur-bg-whatsapp { background: #25D366; }
        .ainur-bg-telegram { background: #0088cc; }
        .ainur-profile-cards { margin-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .ainur-service-card { background: #f5f5f7; border-radius: 20px; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .ainur-service-info { flex-grow: 1; padding-right: 15px; }
        .ainur-service-title { font-size: 16px; font-weight: 600; color: #000; margin-bottom: 5px; }
        .ainur-service-desc { font-size: 13px; color: #888; line-height: 1.3;}
        .ainur-service-img { width: 64px; height: 64px; border-radius: 12px; background: #ddd; object-fit: cover; flex-shrink: 0; }

        /* --- КНОПКИ БАЗОВОЙ ПАНЕЛИ --- */
        .ainur-menu-btn, .ainur-send-btn { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; padding: 0; transition: transform 0.2s; }
        .ainur-menu-btn { background: #000000; border: none; position: relative;} 
        .ainur-send-btn { background: var(--ainur-primary); border: none; }
        .ainur-menu-btn:active, .ainur-send-btn:active { transform: scale(0.95); }
        
        .ainur-menu-icon-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: transform 0.4s ease, opacity 0.4s ease; }
        #ainur-icon-burger { opacity: 1; transform: rotate(0deg); }
        #ainur-icon-cross { opacity: 0; transform: rotate(-90deg); pointer-events: none;}
        .ainur-menu-btn.menu-open #ainur-icon-burger { opacity: 0 !important; transform: rotate(90deg); pointer-events: none;}
        .ainur-menu-btn.menu-open #ainur-icon-cross { opacity: 1 !important; transform: rotate(0deg); }

        .ainur-input-wrapper { flex-grow: 1; height: 100%; margin: 0 10px; display: flex; align-items: center; overflow: hidden; opacity: 1; transition: opacity 0.3s; }
        .intro-state .ainur-input-wrapper, .intro-state .ainur-send-btn { display: none; opacity: 0; }
        .ainur-fake-input { width: 100%; color: #888; font-size: 14px; cursor: pointer; white-space: nowrap; font-family: inherit;}
        .ainur-typing-cursor { display: inline-block; width: 2px; height: 14px; background-color: #333; margin-left: 2px; animation: ainurBlink 1s step-end infinite; }
        @keyframes ainurBlink { 50% { opacity: 0; } }
        .ainur-real-input { display: none; width: 100%; height: 100%; border: none; background: transparent; font-size: 14px; outline: none; color: #333; font-family: inherit;}

        /* --- FULLSCREEN STORY OVERLAY (9:16) --- */
        #ainur-fullscreen-story {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: rgba(0,0,0,0.38); z-index: 1000000; display: none; flex-direction: column; opacity: 0; transition: opacity 0.3s;
            justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }
        #ainur-fullscreen-story.active { display: flex; opacity: 1; }
        
        .fs-story-wrapper { position: relative; width: 100%; max-width: calc(100vh * (9/16)); height: 100%; background: #111; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
        .fs-story-progress-container { width: 100%; padding: 15px 10px 5px 10px; box-sizing: border-box; display: flex; gap: 5px; position: absolute; top: 0; z-index: 100001;}
        .fs-story-bar { flex-grow: 1; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .fs-story-fill { height: 100%; width: 0%; background: #fff; }
        .fs-story-header { position: absolute; top: 25px; left: 0; width: 100%; padding: 0 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100001;}
        .fs-story-author { color: #fff; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;}
        .fs-story-author-avatar { width: 32px; height: 32px; border-radius: 50%; background: #fff; }
        .fs-story-content-area { position: relative; flex-grow: 1; width: 100%; height: 100%; background: linear-gradient(45deg, #1C1C1E, #3A3A3C); display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; font-weight: bold;}
        .fs-tap-zone { position: absolute; top: 0; height: 100%; z-index: 100002; }
        .fs-tap-left { left: 0; width: 30%; }
        .fs-tap-center { left: 30%; width: 40%; }
        .fs-tap-right { right: 0; width: 30%; }
    </style>
</head>
<body>

<div id="ainur-fullscreen-story">
    <div class="fs-story-wrapper" id="fs-swipe-zone">
        <div class="fs-story-progress-container">
            <div class="fs-story-bar"><div class="fs-story-fill" id="fs-fill-0"></div></div>
            <div class="fs-story-bar"><div class="fs-story-fill" id="fs-fill-1"></div></div>
            <div class="fs-story-bar"><div class="fs-story-fill" id="fs-fill-2"></div></div>
        </div>
        <div class="fs-story-header">
            <div class="fs-story-author"><div class="fs-story-author-avatar"></div> AI NUR Platform</div>
            <button class="ainur-nav-btn" style="background: rgba(255,255,255,0.2);" onclick="ainurCloseFullscreenStory()">
                <svg class="ainur-nav-icon" style="stroke: white;" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="fs-story-content-area">
            <div id="fs-story-media">Стори 1</div>
            <div class="fs-tap-zone fs-tap-left" onclick="ainurPrevStory()"></div>
            <div class="fs-tap-zone fs-tap-center" onmousedown="ainurPauseStory()" onmouseup="ainurResumeStory()" ontouchstart="ainurPauseStory()" ontouchend="ainurResumeStory()"></div>
            <div class="fs-tap-zone fs-tap-right" onclick="ainurNextStory()"></div>
        </div>
    </div>
</div>

<div id="ainur-widget">
    <div id="ainur-popup-area">
        
        <button class="ainur-nav-btn" id="ainur-universal-close" onclick="ainurCloseAll()">
            <svg class="ainur-nav-icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <div id="ainur-menu-window">
            <div class="ainur-menu-item" onclick="ainurOpenProfileFromMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8BFDA8" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
                <span class="ainur-menu-text">Профиль</span>
            </div>
            <div class="ainur-menu-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8BFDA8" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span class="ainur-menu-text">Каталог</span>
            </div>
            <div class="ainur-menu-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8BFDA8" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <span class="ainur-menu-text">Оставить заявку</span>
            </div>
            <div class="ainur-menu-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8BFDA8" stroke-width="2" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                <span class="ainur-menu-text">Контакты</span>
            </div>
            <div class="ainur-menu-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 24L1.687 17.837C0.645998 16.033 0.0989998 13.988 0.0999998 11.891C0.103 5.335 5.43799 0 11.993 0C15.174 0.001 18.16 1.24 20.406 3.488C22.6509 5.736 23.8869 8.724 23.8859 11.902C23.8829 18.459 18.548 23.794 11.993 23.794C10.003 23.793 8.04198 23.294 6.30499 22.346L0 24ZM6.59698 20.193C8.27298 21.188 9.87298 21.784 11.989 21.785C17.437 21.785 21.875 17.351 21.878 11.9C21.88 6.438 17.463 2.01 11.997 2.008C6.54498 2.008 2.11 6.442 2.108 11.892C2.107 14.117 2.75899 15.783 3.85399 17.526L2.85499 21.174L6.59698 20.193ZM17.984 14.729C17.91 14.605 17.712 14.531 17.414 14.382C17.117 14.233 15.656 13.514 15.383 13.415C15.111 13.316 14.913 13.266 14.714 13.564C14.516 13.861 13.946 14.531 13.773 14.729C13.6 14.927 13.426 14.952 13.129 14.803C12.832 14.654 11.874 14.341 10.739 13.328C9.85598 12.54 9.25898 11.567 9.08598 11.269C8.91298 10.972 9.06798 10.811 9.21598 10.663C9.34998 10.53 9.51298 10.316 9.66198 10.142C9.81298 9.97 9.86198 9.846 9.96198 9.647C10.061 9.449 10.012 9.275 9.93698 9.126C9.86198 8.978 9.26798 7.515 9.02098 6.92C8.77898 6.341 8.53398 6.419 8.35198 6.41L7.78198 6.4C7.58398 6.4 7.26198 6.474 6.98998 6.772C6.71798 7.07 5.94999 7.788 5.94999 9.251C5.94999 10.714 7.01498 12.127 7.16298 12.325C7.31198 12.523 9.25798 15.525 12.239 16.812C12.948 17.118 13.502 17.301 13.933 17.438C14.645 17.664 15.293 17.632 15.805 17.556C16.376 17.471 17.563 16.837 17.811 16.143C18.059 15.448 18.059 14.853 17.984 14.729Z" fill="#8BFDA8"/></svg>
                <span class="ainur-menu-text">Написать в Whatsapp</span>
            </div>
        </div>

        <div id="ainur-chat-window">
            <div class="ainur-header">
                <div class="ainur-chat-header-content">
                    <div class="ainur-story-ring-small" onclick="ainurOpenFullscreenStory()"><div class="ainur-avatar-small"></div></div>
                    <div class="ainur-brand-info" onclick="ainurOpenProfile()">
                        <div class="ainur-brand-name">Название компании</div>
                        <div class="ainur-brand-profile">Профиль</div>
                    </div>
                </div>
            </div>
            <div class="ainur-chat-body" id="ainur-chat-messages"></div>

            <div id="ainur-profile-window">
                <div class="ainur-header">
                    <button class="ainur-nav-btn" onclick="ainurCloseProfile()"><svg class="ainur-nav-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
                    <div style="flex-grow: 1;"></div>
                </div>
                <div class="ainur-profile-content">
                    <div class="ainur-story-ring-large" onclick="ainurOpenFullscreenStory()"><div class="ainur-avatar-large"></div></div>
                    <div class="ainur-profile-title">Название компании</div>

    <script>
        let ainurStoryTimer;
        let ainurIsChatOpen = false;
        let ainurIsMenuOpen = false;

        function ainurCloseAll() {
            document.getElementById('ainur-chat-window').style.display = 'none';
            document.getElementById('ainur-menu-window').style.display = 'none';
            document.getElementById('ainur-profile-window').classList.remove('active');
            document.getElementById('ainur-menu-toggle').classList.remove('menu-open');
            document.getElementById('ainur-universal-close').style.display = 'none';
            ainurIsChatOpen = false; ainurIsMenuOpen = false;
        }

        // Клик вне виджета (Click Outside)
        document.addEventListener('click', (e) => {
            const widget = document.getElementById('ainur-widget');
            const fsStory = document.getElementById('ainur-fullscreen-story');
            if (widget && fsStory) {
                // Если кликнули НЕ по виджету и НЕ по сторис
                if (!widget.contains(e.target) && !fsStory.contains(e.target)) {
                    if (ainurIsChatOpen || ainurIsMenuOpen || fsStory.classList.contains('active')) {
                        ainurCloseAll();
                        ainurCloseFullscreenStory();
                    }
                }
            }
        });

        function ainurOpenProfile() { document.getElementById('ainur-profile-window').classList.add('active'); }
        function ainurCloseProfile() { document.getElementById('ainur-profile-window').classList.remove('active'); }

        function ainurOpenProfileFromMenu() {
            document.getElementById('ainur-menu-window').style.display = 'none'; ainurIsMenuOpen = false;
            document.getElementById('ainur-trigger').style.display = 'none';
            document.getElementById('ainur-real-input').style.display = 'block';
            document.getElementById('ainur-chat-window').style.display = 'flex'; ainurIsChatOpen = true;
            document.getElementById('ainur-universal-close').style.display = 'flex';
            document.getElementById('ainur-menu-toggle').classList.remove('menu-open');
            ainurOpenProfile();
        }

        // STORIES
        let ainurCurrentStory = 0; let ainurStoryProgress = 0; let ainurStoryInterval; let ainurIsPaused = false;
        const ainurTotalStories = 3; const ainurStoryDuration = 4000; const ainurTickRate = 50;

        function ainurOpenFullscreenStory() { document.getElementById('ainur-fullscreen-story').classList.add('active'); ainurCurrentStory = 0; ainurStartStory(); }
        function ainurCloseFullscreenStory() { document.getElementById('ainur-fullscreen-story').classList.remove('active'); clearInterval(ainurStoryInterval); ainurResetBars(); }
        function ainurResetBars() { for(let i=0; i<ainurTotalStories; i++) { document.getElementById(`fs-fill-${i}`).style.width = (i < ainurCurrentStory ? '100%' : '0%'); } }
        
        function ainurStartStory() {
            clearInterval(ainurStoryInterval); ainurStoryProgress = 0; ainurResetBars();
            document.getElementById('fs-story-media').innerText = `Стори ${ainurCurrentStory + 1}`;
            ainurStoryInterval = setInterval(() => {
                if(ainurIsPaused) return;
                ainurStoryProgress += ainurTickRate;
                let percent = (ainurStoryProgress / ainurStoryDuration) * 100;
                document.getElementById(`fs-fill-${ainurCurrentStory}`).style.width = `${percent}%`;
                if (ainurStoryProgress >= ainurStoryDuration) {
                    ainurCurrentStory++;
                    if (ainurCurrentStory >= ainurTotalStories) { ainurCloseFullscreenStory(); } else { ainurStartStory(); }
                }
            }, ainurTickRate);
        }
        function ainurPauseStory() { ainurIsPaused = true; }
        function ainurResumeStory() { ainurIsPaused = false; }
        function ainurPrevStory() { if(ainurCurrentStory > 0) { ainurCurrentStory--; ainurStartStory(); } else { ainurStartStory(); } }
        function ainurNextStory() { if(ainurCurrentStory < ainurTotalStories - 1) { ainurCurrentStory++; ainurStartStory(); } else { ainurCloseFullscreenStory(); } }

        let ainurTouchStartY = 0; const ainurSwipeZone = document.getElementById('fs-swipe-zone');
        ainurSwipeZone.addEventListener('touchstart', e => { ainurTouchStartY = e.changedTouches[0].screenY; }, {passive: true});
        ainurSwipeZone.addEventListener('touchend', e => { if (e.changedTouches[0].screenY - ainurTouchStartY > 60) { ainurCloseFullscreenStory(); } }, {passive: true});

                `<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18.7762 21C13.9377 21 10.0013 17.0623 10 12.2238C10.0013 10.9974 11 10 12.2238 10C12.3497 10 12.4742 10.0106 12.5934 10.0318C12.8556 10.0755 13.1046 10.1642 13.3338 10.298C13.3669 10.3179 13.3894 10.3497 13.3947 10.3868L13.906 13.6093C13.9126 13.6477 13.9007 13.6848 13.8755 13.7126C13.5934 14.0252 13.2331 14.2503 12.8318 14.3629L12.6384 14.4172L12.7113 14.604C13.3709 16.2834 14.7139 17.6252 16.3947 18.2874L16.5815 18.3616L16.6358 18.1682C16.7483 17.7669 16.9735 17.4066 17.2861 17.1245C17.3086 17.1033 17.3391 17.0927 17.3695 17.0927C17.3762 17.0927 17.3828 17.0927 17.3907 17.094L20.6132 17.6053C20.6517 17.6119 20.6834 17.6331 20.7033 17.6662C20.8358 17.8954 20.9245 18.1457 20.9695 18.4079C20.9907 18.5245 21 18.6477 21 18.7762C21 20.0013 20.0026 20.9987 18.7762 21Z" fill="#8BFDA8"/><path d="M17.3848 22.9229C19.4238 22.9229 21.0771 24.5762 21.0771 26.6152V30.3076C21.0771 32.2829 19.5258 33.8959 17.5752 33.9951L17.3848 34H13.6924L13.502 33.9951C11.6143 33.8993 10.1007 32.3857 10.0049 30.498L10 30.3076V26.6152C10.0001 24.5761 11.6532 22.9229 13.6924 22.9229H17.3848ZM30.3086 22.9229C32.3477 22.9229 34.0009 24.5762 34.001 26.6152V30.3076C34.001 32.2829 32.4497 33.8959 30.499 33.9951L30.3086 34H26.6162L26.4258 33.9951C24.5381 33.8993 23.0246 32.3857 22.9287 30.498L22.9238 30.3076V26.6152C22.9239 24.5761 24.5771 22.9229 26.6162 22.9229H30.3086ZM13.6924 24.7695C12.6728 24.7695 11.8458 25.5957 11.8457 26.6152V30.3076C11.8457 31.3272 12.6728 32.1543 13.6924 32.1543H17.3848C18.4043 32.1542 19.2305 31.3272 19.2305 30.3076V26.6152C19.2304 25.5958 18.4042 24.7696 17.3848 24.7695H13.6924ZM26.6162 24.7695C25.5967 24.7695 24.7696 25.5957 24.7695 26.6152V30.3076C24.7695 31.3272 25.5966 32.1543 26.6162 32.1543H30.3086C31.3281 32.1542 32.1543 31.3272 32.1543 30.3076V26.6152C32.1542 25.5958 31.3281 24.7696 30.3086 24.7695H26.6162ZM30.3086 10C32.3477 10.0001 34.001 11.6532 34.001 13.6924V17.3848C34.0009 19.36 32.4496 20.9731 30.499 21.0723L30.3086 21.0771H26.6162L26.4258 21.0723C24.5382 20.9764 23.0247 19.4628 22.9287 17.5752L22.9238 17.3848V13.6924C22.9238 11.6532 24.577 10 26.6162 10H30.3086ZM26.6162 11.8457C25.5966 11.8457 24.7695 12.6728 24.7695 13.6924V17.3848C24.7696 18.4043 25.5967 19.2305 26.6162 19.2305H30.3086C31.3281 19.2304 32.1542 18.4042 32.1543 17.3848V13.6924C32.1543 12.6728 31.3281 11.8458 30.3086 11.8457H26.6162Z" fill="#8BFDA8"/></svg>`
            ];

            setTimeout(() => {
                widgetBase.style.opacity = '1';
                let currentStep = 0;
                const animInterval = setInterval(() => {
                    currentStep++;
                    if (currentStep < introIcons.length) {
                        iconBurger.style.opacity = '0';
                        setTimeout(() => { iconBurger.innerHTML = introIcons[currentStep]; iconBurger.style.opacity = '1'; }, 100);
                    } else {
                        clearInterval(animInterval);
                        iconBurger.style.opacity = '0'; 
                        setTimeout(() => { 
                            iconBurger.innerHTML = introIcons[introIcons.length - 1]; 
                            iconBurger.style.opacity = ''; 
                        }, 100);
                        
                        bottomBar.classList.remove('intro-state');
                        setTimeout(() => { aiGlow.style.opacity = '1'; }, 200);
                        setTimeout(() => {
                            inputWrapper.style.display = 'flex'; sendBtn.style.display = 'flex';
                            setTimeout(() => { inputWrapper.style.opacity = '1'; sendBtn.style.opacity = '1'; ainurTypeWriter(); }, 50);
                        }, 400); 
                    }
                }, 320); 
            }, 600); 

            // CHAT LOGIC
            const menuBtn = document.getElementById('ainur-menu-toggle');
            const menuWindow = document.getElementById('ainur-menu-window');
            const chatWindow = document.getElementById('ainur-chat-window');
            const fakeInput = document.getElementById('ainur-trigger');
            const realInput = document.getElementById('ainur-real-input');
            const chatBody = document.getElementById('ainur-chat-messages');

            const phrase = "Напиши мне и я отвечу на все вопросы";
            let i = 0; let typeTimeout;
            function ainurTypeWriter() {
                if (i < phrase.length) {
                    document.getElementById('ainur-typewriter-text').innerHTML += phrase.charAt(i);
                    i++; typeTimeout = setTimeout(ainurTypeWriter, 50);
                } else {
                    typeTimeout = setTimeout(() => { document.getElementById('ainur-typewriter-text').innerHTML = ""; i = 0; ainurTypeWriter(); }, 4000);
                }
            }

            function switchToRealInput() { if (fakeInput.style.display !== 'none') { clearTimeout(typeTimeout); fakeInput.style.display = 'none'; realInput.style.display = 'block'; } }

            function addAiMessageWithButtons(text, buttons) {
                const wrapper = document.createElement('div'); wrapper.className = 'ainur-message-wrapper ai';
                const msg = document.createElement('div'); msg.className = 'ainur-message ai'; msg.innerText = text;
                wrapper.appendChild(msg);
                if (buttons && buttons.length > 0) {
                    const btnContainer = document.createElement('div'); btnContainer.className = 'ainur-quick-replies';
                    buttons.forEach(btnText => {
                        const btn = document.createElement('button'); btn.className = 'ainur-qr-btn'; btn.innerText = btnText;
                        btn.onclick = () => { addClientMessage(btnText); btnContainer.style.opacity = '0.5'; btnContainer.style.pointerEvents = 'none'; };
                        btnContainer.appendChild(btn);
                    });
                    wrapper.appendChild(btnContainer);
                }
                chatBody.appendChild(wrapper); chatBody.scrollTop = chatBody.scrollHeight;
            }

            // ЗАМЕНИ СВОЙ ID ПРОЕКТА СЮДА!
            const MY_PROJECT_ID = '8db21154-dc19-4c40-8fed-f0dffe7f7ad9'; 

            async function addClientMessage(text) {
                // 1. Показываем сообщение пользователя
                const wrapper = document.createElement('div'); wrapper.className = 'ainur-message-wrapper client';
                const msg = document.createElement('div'); msg.className = 'ainur-message client'; msg.innerText = text;
                wrapper.appendChild(msg); chatBody.appendChild(wrapper); chatBody.scrollTop = chatBody.scrollHeight;
                
                // Временное сообщение "Печатает..."
                const loadingWrapper = document.createElement('div'); loadingWrapper.className = 'ainur-message-wrapper ai';
                const loadingMsg = document.createElement('div'); loadingMsg.className = 'ainur-message ai'; loadingMsg.innerText = 'печатает...';
                loadingWrapper.appendChild(loadingMsg); chatBody.appendChild(loadingWrapper); chatBody.scrollTop = chatBody.scrollHeight;

                try {
                    // 2. Отправляем запрос на наш сервер Next.js
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            projectId: MY_PROJECT_ID, // ID проекта из базы
                            message: text
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Удаляем "Печатает..."
                    chatBody.removeChild(loadingWrapper);
                    
                    // 3. Показываем ответ ИИ
                    if (data.reply) {
                        addAiMessageWithButtons(data.reply, []); 
                    } else {
                        addAiMessageWithButtons('Ой, что-то пошло не так.', []);
                    }
                } catch(e) {
                    chatBody.removeChild(loadingWrapper);
                    addAiMessageWithButtons('Сервер сейчас недоступен.', []);
                }
            }

            function openChat() {
                switchToRealInput();
                if (ainurIsMenuOpen) { menuWindow.style.display = 'none'; ainurIsMenuOpen = false; menuBtn.classList.remove('menu-open'); }
                if (!ainurIsChatOpen) {
                    chatWindow.style.display = 'flex'; ainurIsChatOpen = true;
                    document.getElementById('ainur-universal-close').style.display = 'flex';
                    if(chatBody.children.length === 0) {
                        setTimeout(() => { addAiMessageWithButtons('Здравствуйте, я ИИ ассистент! Напишите, чем могу вам помочь?', ['Расскажите про услуги', 'Ваши цены']); }, 500);
                    }
                }
            }

            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (bottomBar.classList.contains('intro-state')) return; 
                
                if (ainurIsMenuOpen) { 
                    menuWindow.style.display = 'none'; ainurIsMenuOpen = false; menuBtn.classList.remove('menu-open');
                } else {
                    if (ainurIsChatOpen) { ainurCloseAll(); }
                    menuWindow.style.display = 'flex'; ainurIsMenuOpen = true; switchToRealInput(); 
                    menuBtn.classList.add('menu-open'); 
                }
            });

            fakeInput.addEventListener('click', openChat);
            realInput.addEventListener('click', openChat);
            document.getElementById('ainur-real-send').addEventListener('click', () => { const text = realInput.value.trim(); if (text) { openChat(); addClientMessage(text); realInput.value = ''; } });
            realInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const text = realInput.value.trim(); if (text) { openChat(); addClientMessage(text); realInput.value = ''; } } });
        });
    </script>
</body>
</html>
